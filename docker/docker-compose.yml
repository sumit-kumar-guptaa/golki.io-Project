services:
  postgres:
    image: postgres:15-alpine
    container_name: golki.io-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-golki.io}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-golki.io}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: golki.io-backend
    expose:
      - "8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-golki.io}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-this}
      - JWT_EXPIRATION=86400000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - UPLOAD_DIR=/app/uploads
      - PORT=8080
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: golki.io-frontend
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  postgres_data:
