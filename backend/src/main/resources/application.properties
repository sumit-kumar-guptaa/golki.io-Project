# Application
spring.application.name=golki.io-backend
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.port=${PORT:8080}

# Database - local H2 by default, override DB_URL/DB_USERNAME/DB_PASSWORD for Postgres
spring.datasource.url=${DB_URL:jdbc:h2:mem:golki.io;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-must-be-at-least-256-bits-long-for-security}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:./uploads}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.com.taskmanagement=DEBUG
logging.level.org.springframework.security=INFO
